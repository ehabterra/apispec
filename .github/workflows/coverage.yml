name: Coverage Badge

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'scripts/**'
      - '.github/workflows/coverage.yml'
  workflow_dispatch:

permissions:
  contents: write   # <-- Needed for pushing changes

jobs:
  coverage:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        # BADGE_TOKEN is a PAT (or GitHub App token) whose owner is allowed to
        # bypass branch protection on main — the default GITHUB_TOKEN cannot be
        # granted that bypass, so the badge commit below would be rejected.
        # actions/checkout persists this token, so `git push` uses it too.
        token: ${{ secrets.BADGE_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.2'

    - name: Make script executable
      run: chmod +x scripts/update-coverage-badge.sh

    - name: Run coverage badge update script
      run: ./scripts/update-coverage-badge.sh

    - name: Commit and push changes
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add changes
        git add README.md
        
        # Check if there are changes to commit
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes to commit"
        else
          echo "Committing changes..."
          git commit -m "Update coverage badge"

          # Push changes to main branch
          echo "Pushing to main branch"
          git push origin main
        fi
